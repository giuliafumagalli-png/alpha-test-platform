<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Login Studente</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body { font-family: Arial; background:#f4f6fb; text-align:center; }
.box { background:white; padding:30px; border-radius:15px; width:300px; margin:100px auto; }
input { width:100%; padding:10px; margin:10px 0; }
button { padding:10px; margin:5px; }
</style>

</head>
<body>

<div class="box">
<h2>Login Studente</h2>

<input id="name" placeholder="Nome">
<input id="surname" placeholder="Cognome">
<input id="password" type="password" placeholder="Password">

<button onclick="register()">Registrati</button>
<button onclick="login()">Entra</button>

<div id="msg"></div>
</div>

<script>

// 🔴 INCOLLA QUI LA TUA KEY (SOLO QUI)
const supabase = window.supabase.createClient(
  "https://bnhoengdtrkrrwpbezwi.supabase.co",
  "sb_publishable_YI1wHHGNOnMeASCg7b4NQw_Ck2F1M2L"
);

// REGISTRAZIONE
async function register() {
  const name = document.getElementById("name").value;
  const surname = document.getElementById("surname").value;
  const password = document.getElementById("password").value;

  if(!name || !surname || !password){
    show("Compila tutti i campi");
    return;
  }

  const { error } = await supabase.from("students").insert([
    { name, surname, password }
  ]);

  if(error){
    show("Errore registrazione");
  } else {
    show("Registrato ✅");
  }
}

// LOGIN
async function login() {
  const name = document.getElementById("name").value;
  const surname = document.getElementById("surname").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabase
    .from("students")
    .select("*")
    .eq("name", name)
    .eq("surname", surname)
    .eq("password", password);

  if(error || data.length === 0){
    show("Login fallito ❌");
  } else {
    show("Login riuscito ✅");
  }
}

function show(t){
  document.getElementById("msg").innerText = t;
}

</script>

</body>
</html>
