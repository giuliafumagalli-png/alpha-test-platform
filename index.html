<!DOCTYPE html>
<html>
<head>
  <title>Alpha Test Platform</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f7fb;
      text-align: center;
      padding: 50px;
    }
    h1 {
      color: #1e3a8a;
    }
    .card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }
    button {
      background: #1e3a8a;
      color: white;
      border: none;
      padding: 15px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>ALPHA TEST</h1>
    <p>Seleziona la tua azienda</p>
    
    <button onclick="enter()">Azienda Demo</button>
  </div>

  <script>
    function enter() {
      const password = prompt("Inserisci password:");
      
      if(password === "1234") {
        alert("Accesso consentito!");
      } else {
        alert("Password errata");
      }
    }
  </script>

</body>
</html>
