<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Alpha Test 2026</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: Arial;
  background: #f5f7fb;
  text-align: center;
  padding: 40px;
}
.card {
  background: white;
  padding: 30px;
  border-radius: 12px;
  max-width: 400px;
  margin: auto;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}
button {
  padding: 12px 20px;
  border: none;
  background: #2c4a9e;
  color: white;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 10px;
}
input {
  display:block;
  margin:10px auto;
  padding:10px;
  width:80%;
}
</style>
</head>

<body>

<div class="card" id="loginScuola">
  <h2>Scuola Internazionale Etica & Sicurezza</h2>
  <button onclick="accessoScuola()">Accedi</button>
</div>

<div class="card" id="loginStudente" style="display:none">
  <h3>Login Studente</h3>
  <input id="nome" placeholder="Nome">
  <input id="cognome" placeholder="Cognome">
  <input id="password" placeholder="Password">
  <button onclick="login()">Entra</button>
  <button onclick="registrati()">Registrati</button>
</div>

<div class="card" id="dashboard" style="display:none">
  <h3>Dashboard</h3>
  <button onclick="startTest()">Alpha Test 30 domande</button>
</div>

<script>

const SUPABASE_URL = "https://bnhoengdtkrrwpbezwi.supabase.co";
const SUPABASE_KEY = "sb_publishable_YI1wHHGNOnMeASCg7b4NQw_Ck2F1M2L";

const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function accessoScuola(){
  const p = prompt("Password scuola");
  if(p==="GiuliaGAM"){
    document.getElementById("loginScuola").style.display="none";
    document.getElementById("loginStudente").style.display="block";
  }
}

async function registrati(){
  const nome = document.getElementById("nome").value;
  const cognome = document.getElementById("cognome").value;
  const password = document.getElementById("password").value;

  await db.from("students").insert([{name:nome,surname:cognome,password:password}]);

  alert("Registrato!");
}

async function login(){
  const nome = document.getElementById("nome").value;
  const cognome = document.getElementById("cognome").value;
  const password = document.getElementById("password").value;

  const { data } = await db
    .from("students")
    .select("*")
    .eq("name", nome)
    .eq("surname", cognome)
    .eq("password", password);

  if(data.length>0){
    document.getElementById("loginStudente").style.display="none";
    document.getElementById("dashboard").style.display="block";
  } else {
    alert("Dati errati");
  }
}

function startTest(){
  alert("Test collegato! (step successivo)");
}

</script>

</body>
</html>
