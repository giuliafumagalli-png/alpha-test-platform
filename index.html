<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Alpha Test Platform</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      width: 320px;
    }

    h1 {
      color: #2c4a9e;
      margin-bottom: 10px;
    }

    button {
      background-color: #2c4a9e;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 20px;
    }

    button:hover {
      opacity: 0.9;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<!-- HOME -->
<div id="home" class="card">
  <h1>ALPHA TEST</h1>
  <p>Seleziona la tua azienda</p>
  <button onclick="login()">Azienda Demo</button>
</div>

<!-- DASHBOARD AZIENDA -->
<div id="dashboard" class="card hidden">
  <h1>Azienda Demo</h1>
  <p>Servizi disponibili</p>

  <button onclick="openAlphaTest()">Alpha Test</button>
</div>

<script>

function login() {
  const password = prompt("Inserisci password:");

  if(password === "GiuliaGAM") {
    document.getElementById("home").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");
  } else {
    alert("Password errata");
  }
}

function openAlphaTest() {
  alert("Qui entrerai nel sistema di test 🔥");
}

</script>

</body>
</html>
